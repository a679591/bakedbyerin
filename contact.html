<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baked by Erin – Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-image: url('/images/background_color.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #2d2d2d;
    }
    .section-heading {
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b4513;
    }
    /* ── Nav ── */
    .header { position: sticky; top: 0; z-index: 100; background: white; border-bottom: 1px solid #e5e7eb; }
    .navbar { display: flex; justify-content: space-between; align-items: center; padding: 1rem 2rem; max-width: 1100px; margin: 0 auto; }
    .nav-logo { font-weight: 700; font-size: 1.2rem; color: #8b4513; text-decoration: none; }
    .nav-menu { display: flex; gap: 2rem; list-style: none; margin: 0; padding: 0; align-items: center; }
    .nav-link { text-decoration: none; color: #2d2d2d; font-weight: 500; transition: color 0.2s; }
    .nav-link:hover { color: #d4734a; }
    .cart-link { position: relative; text-decoration: none; font-size: 1.4rem; }
    #cart-badge { position: absolute; top: -8px; right: -10px; background: #d4734a; color: white; border-radius: 50%; width: 18px; height: 18px; font-size: 0.65rem; font-weight: 700; display: none; align-items: center; justify-content: center; }
    .hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; background: none; border: none; padding: 4px; }
    .bar { width: 25px; height: 3px; background: #2d2d2d; border-radius: 3px; transition: all 0.3s ease; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @media (max-width: 768px) {
      .hamburger { display: flex; }
      .nav-menu { display: none; flex-direction: column; position: absolute; top: 65px; left: 0; right: 0; background: white; padding: 1rem 2rem; border-bottom: 1px solid #e5e7eb; gap: 1rem; align-items: flex-start; }
      .nav-menu.active { display: flex; }
    }
  </style>
</head>
<body class="antialiased">

  <header class="header">
    <nav class="navbar">
      <a href="index.html" class="nav-logo">🧁 BAKED BY ERIN</a>
      <ul class="nav-menu">
        <li><a href="index.html" class="nav-link">Home</a></li>
        <li><a href="menu.html" class="nav-link">Menu</a></li>
        <li><a href="passover_menu.html" class="nav-link">Passover Menu</a></li>
        <li><a href="contact.html" class="nav-link">Contact</a></li>
        <li>
          <a href="cart.html" class="cart-link" title="View Cart">
            🛒<span id="cart-badge"></span>
          </a>
        </li>
      </ul>
      <button class="hamburger" aria-label="Open menu">
        <span class="bar"></span><span class="bar"></span><span class="bar"></span>
      </button>
    </nav>
  </header>

  <main>
    <section id="contact" class="py-16 px-4">
      <div class="container mx-auto max-w-4xl text-center">
        <h2 class="section-heading mb-12">Get In Touch</h2>
        <div class="space-y-8">
          <div class="flex items-center justify-center space-x-4">
            <span class="text-2xl">📧</span>
            <div>
              <p class="font-medium">Email</p>
              <a href="mailto:erinjillianrodriguez@gmail.com" class="text-[#d4734a] hover:underline">
                erinjillianrodriguez@gmail.com
              </a>
            </div>
          </div>
          <div class="flex items-center justify-center space-x-4">
            <span class="text-2xl">📸</span>
            <div>
              <p class="font-medium">Instagram</p>
              <a href="https://www.instagram.com/getbakedbyerin/" class="text-[#d4734a] hover:underline" target="_blank" rel="noopener noreferrer">
                @getbakedbyerin
              </a>
            </div>
          </div>
          <div class="flex items-center justify-center space-x-4">
            <span class="text-2xl">💬</span>
            <div>
              <p class="font-medium">Text</p>
              <p class="text-[#d4734a]">(724) 704-0514</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="text-center py-8 border-t border-gray-200">
    <div class="container mx-auto px-4">
      <p class="text-gray-500 text-sm">&copy; 2025 Baked by Erin. All rights reserved.</p>
    </div>
  </footer>

  <script src="cart.js"></script>
  <script>
    document.querySelector('.hamburger').addEventListener('click', () => {
      document.querySelector('.nav-menu').classList.toggle('active');
    });
    document.querySelectorAll('.nav-link').forEach(l =>
      l.addEventListener('click', () => document.querySelector('.nav-menu').classList.remove('active'))
    );
  </script>
</body>
</html>
