<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baked by Erin – Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-image: url('/images/background_color.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #2d2d2d;
    }
    .section-heading {
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b4513;
    }
  </style>
</head>
<body class="antialiased">

  <!-- Header -->
  <header style="position:sticky;top:0;z-index:100;background:white;border-bottom:1px solid #e5e7eb;">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;max-width:1100px;margin:0 auto;">
      <a href="index.html" style="font-weight:700;font-size:1.2rem;color:#8b4513;text-decoration:none;">🧁 BAKED BY ERIN</a>

      <ul id="nav-menu" style="display:flex;gap:2rem;list-style:none;margin:0;padding:0;align-items:center;">
        <li><a href="index.html" style="text-decoration:none;color:#2d2d2d;font-weight:500;">Home</a></li>
        <li><a href="menu.html" style="text-decoration:none;color:#2d2d2d;font-weight:500;">Menu</a></li>
        <li><a href="passover_menu.html" style="text-decoration:none;color:#2d2d2d;font-weight:500;">Passover Menu</a></li>
        <li><a href="contact.html" style="text-decoration:none;color:#2d2d2d;font-weight:500;">Contact</a></li>
        <li>
          <a href="cart.html" style="text-decoration:none;font-size:1.4rem;position:relative;">
            🛒<span id="cart-badge" style="position:absolute;top:-8px;right:-10px;background:#d4734a;color:white;border-radius:50%;width:18px;height:18px;font-size:0.65rem;font-weight:700;display:none;align-items:center;justify-content:center;"></span>
          </a>
        </li>
      </ul>

      <button id="hamburger-btn" style="display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px;" aria-label="Open menu">
        <span style="width:25px;height:3px;background:#2d2d2d;border-radius:3px;display:block;"></span>
        <span style="width:25px;height:3px;background:#2d2d2d;border-radius:3px;display:block;"></span>
        <span style="width:25px;height:3px;background:#2d2d2d;border-radius:3px;display:block;"></span>
      </button>
    </div>
  </header>

  <main>
    <section id="contact" class="py-16 px-4">
      <div class="container mx-auto max-w-4xl text-center">
        <h2 class="section-heading mb-12">Get In Touch</h2>
        <div class="space-y-8">
          <div class="flex items-center justify-center space-x-4">
            <span class="text-2xl">📧</span>
            <div>
              <p class="font-medium">Email</p>
              <a href="mailto:erinjillianrodriguez@gmail.com" class="text-[#d4734a] hover:underline">
                erinjillianrodriguez@gmail.com
              </a>
            </div>
          </div>
          <div class="flex items-center justify-center space-x-4">
            <span class="text-2xl">📸</span>
            <div>
              <p class="font-medium">Instagram</p>
              <a href="https://www.instagram.com/getbakedbyerin/" class="text-[#d4734a] hover:underline" target="_blank" rel="noopener noreferrer">
                @getbakedbyerin
              </a>
            </div>
          </div>
          <div class="flex items-center justify-center space-x-4">
            <span class="text-2xl">💬</span>
            <div>
              <p class="font-medium">Text</p>
              <p class="text-[#d4734a]">(724) 704-0514</p>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="text-center py-8 border-t border-gray-200">
    <div class="container mx-auto px-4">
      <p class="text-gray-500 text-sm">&copy; 2025 Baked by Erin. All rights reserved.</p>
    </div>
  </footer>

  <script src="cart.js"></script>
  <script>
    const hamburgerBtn = document.getElementById('hamburger-btn');
    const navMenu = document.getElementById('nav-menu');
    let menuOpen = false;

    function setMobileLayout() {
      if (window.innerWidth <= 768) {
        hamburgerBtn.style.display = 'flex';
        if (!menuOpen) navMenu.style.display = 'none';
      } else {
        hamburgerBtn.style.display = 'none';
        navMenu.style.display = 'flex';
        navMenu.style.flexDirection = 'row';
        navMenu.style.position = 'static';
        menuOpen = false;
      }
    }

    hamburgerBtn.addEventListener('click', () => {
      menuOpen = !menuOpen;
      if (menuOpen) {
        navMenu.style.display = 'flex';
        navMenu.style.flexDirection = 'column';
        navMenu.style.position = 'absolute';
        navMenu.style.top = '65px';
        navMenu.style.left = '0';
        navMenu.style.right = '0';
        navMenu.style.background = 'white';
        navMenu.style.padding = '1rem 2rem';
        navMenu.style.borderBottom = '1px solid #e5e7eb';
        navMenu.style.gap = '1rem';
        navMenu.style.alignItems = 'flex-start';
        navMenu.style.zIndex = '99';
      } else {
        navMenu.style.display = 'none';
      }
    });

    navMenu.querySelectorAll('a').forEach(link => {
      link.addEventListener('click', () => {
        menuOpen = false;
        if (window.innerWidth <= 768) navMenu.style.display = 'none';
      });
    });

    window.addEventListener('resize', setMobileLayout);
    setMobileLayout();
  </script>
</body>
</html>
