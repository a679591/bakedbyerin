<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baked by Erin – Place an Order</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-image: url('/images/background_color.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      color: #2d2d2d;
    }

    .section-heading {
      font-size: 2rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #8b4513;
    }

    .minimal-nav {
      background: white;
      border-bottom: 1px solid #e5e7eb;
    }

    .btn-primary {
      background-color: #d4734a;
      color: white;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: all 0.3s ease;
    }

    .btn-primary:hover {
      background-color: #c55a35;
      transform: translateY(-1px);
    }
/* Nav layout */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: white;
  border-bottom: 1px solid #e5e7eb;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 1rem 2rem;
  max-width: 1100px;
  margin: 0 auto;
}

.nav-logo {
  font-weight: 700;
  font-size: 1.25rem;
  color: #8b4513;
  text-decoration: none;
}

.nav-menu {
  display: flex;
  gap: 2rem;
  list-style: none;
  margin: 0;
  padding: 0;
}

.nav-link {
  text-decoration: none;
  color: #2d2d2d;
  font-weight: 500;
  transition: color 0.2s;
}

.nav-link:hover {
  color: #d4734a;
}

/* Hamburger — hidden on desktop */
.hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
}

.bar {
  width: 25px;
  height: 3px;
  background-color: #2d2d2d;
  border-radius: 3px;
  transition: all 0.3s ease;
}

/* Mobile styles */
@media (max-width: 768px) {
  .hamburger {
    display: flex;
  }

  .nav-menu {
    display: none;
    flex-direction: column;
    position: absolute;
    top: 65px;
    left: 0;
    right: 0;
    background: white;
    padding: 1rem 2rem;
    border-bottom: 1px solid #e5e7eb;
    gap: 1rem;
  }

  .nav-menu.active {
    display: flex;
  }
}
  </style>
</head>
<body class="antialiased">

  <!-- Header -->
<header class="header">
  <nav class="navbar">
    <a href="index.html" class="nav-logo">🧁 BAKED BY ERIN</a>
    <ul class="nav-menu">
      <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
      <li class="nav-item"><a href="menu.html" class="nav-link">Menu</a></li>
      <li class="nav-item"><a href="passover_menu.html" class="nav-link">Passover Menu</a></li>
      <li class="nav-item"><a href="contact.html" class="nav-link">Contact</a></li>
      <li class="nav-item"><a href="order.html" class="nav-link">Order Now</a></li>
    </ul>
    <div class="hamburger">
      <span class="bar"></span>
      <span class="bar"></span>
      <span class="bar"></span>
    </div>
  </nav>
</header>
  <main>
    <!-- Place an Order -->
    <section class="py-16 px-4">
      <div class="container mx-auto max-w-4xl">
        <div class="bg-gray-50 p-6 rounded-lg">
          <section class="py-16 px-4">
            <div class="container mx-auto max-w-4xl">
            <!-- Announcement (added) -->
              <div class="mb-8">
                <div class="bg-yellow-50 border-l-4 border-yellow-400 text-yellow-800 p-4 rounded-lg shadow-sm">
                  <p class="text-center font-semibold">Announcement: <span class="font-normal">Get your orders in for Passover!</span></p>
                </div>
              </div>
              <!-- /Announcement -->

              <h2 class="section-heading text-center mb-12">Place an Order</h2>
              <div class="bg-gray-50 p-6 rounded-lg">
                <!-- Google Form Embed START -->
                <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSeuCsuk33sQo0GC-zlrdHz1D2LoIcIGS_Mrpa3YoSuDPkowvQ/viewform?embedded=true" 
                        width="640" height="1150" frameborder="0" marginheight="0" marginwidth="0">
                  Loading…
                </iframe>
                <!-- Google Form Embed END -->
                <!-- Announcement (added) -->
              <div class="mb-8">
                <div class="bg-yellow-50 border-l-4 border-yellow-400 text-yellow-800 p-4 rounded-lg shadow-sm">
                  <p class="text-center font-semibold">Payment Methods: <span class="font-normal">Pay by PayPal, Venmo, CashApp, Zelle, Cash, or Check</span></p>
                </div>
              </div>
              <!-- /Announcement -->
              </div>
            </div>
          </section>
        </div>
      </div>
    </section>
  </main>

  <footer class="text-center py-8 border-t border-gray-200">
    <p class="text-gray-500 text-sm">&copy; 2025 Baked by Erin. All rights reserved.</p>
  </footer>

  <script>
    document.querySelector('form').addEventListener('submit', e => {
      e.preventDefault();
      alert('Thank you for your order request! Erin will contact you soon.');
      e.target.reset();
    });
  </script>

  <script>
    const hamburger = document.querySelector('.hamburger');
    const navMenu = document.querySelector('.nav-menu');

    hamburger.addEventListener('click', () => {
      navMenu.classList.toggle('active');
    });

    document.querySelectorAll('.nav-link').forEach(link => {
      link.addEventListener('click', () => {
        navMenu.classList.remove('active');
      });
    });
  </script>

</body>
</html>
